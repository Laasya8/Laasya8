name: Generate Contribution Snake

on:
  # Run automatically once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake animation SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#EC4899&color_dots=#1b1b2f,#7C3AED,#A855F7,#EC4899,#06B6D4
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#EC4899&color_dots=#161b22,#7C3AED,#A855F7,#EC4899,#06B6D4

      - name: Push generated SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
